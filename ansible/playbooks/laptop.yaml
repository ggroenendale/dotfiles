---
- name: Laptop — Complete Configuration
  hosts: localhost
  connection: local
  become: false
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    # Minimum required versions
    min_python_version: "3.8"
    min_ansible_version: "2.14"
    # GitHub connectivity check
    github_url: "https://github.com"
    github_timeout_seconds: 10
    core_roles_to_apply:
      - core/users
      - core/security

  tasks:
    - name: Display Laptop Playbook start
      ansible.builtin.debug:
        msg: "=== Laptop Playbook Started ==="

    - name: Include Core Roles
      ansible.builtin.include_role:
        name: { { role_item } }
      loop: "{{ core_roles_to_apply }}"
      loop_control:
        loop_var: role_item
