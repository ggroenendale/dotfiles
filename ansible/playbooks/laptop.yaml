---
- name: Laptop — Complete Configuration
  hosts: localhost
  connection: local
  become: false
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    # Minimum required versions
    min_python_version: "3.8"
    min_ansible_version: "2.14"
    # GitHub connectivity check
    github_url: "https://github.com"
    github_timeout_seconds: 10
    is_debian: "{{ 'Debian' in ansible_facts.distribution }}"
    is_ubuntu: "{{ 'Ubuntu' in ansible_facts.distribution }}"
    is_opensuse: "{{ ansible_facts.os_family == 'Suse' }}"
    is_arch: "{{ 'Arch' in ansible_facts.distribution }}"
    system_roles_to_apply:
      - system/bootloader
    hardware_roles_to_apply:
      - hardware/bluetooth
    core_roles_to_apply:
      - core/users
      - core/security
    desktop_roles_to_apply:
      - desktop/login_manager
    dev_roles_to_apply:
      - dev/build_tools

  tasks:
    - name: Display Laptop Playbook start
      ansible.builtin.debug:
        msg: "=== Laptop Playbook Started ==="

    - name: Include System Roles
      ansible.builtin.include_role:
        name: "{{ role_item }}"
      loop: "{{ system_roles_to_apply }}"
      loop_control:
        loop_var: role_item

    - name: Include Hardware Roles
      ansible.builtin.include_role:
        name: "{{ role_item }}"
      loop: "{{ hardware_roles_to_apply }}"
      loop_control:
        loop_var: role_item

    - name: Include Core Roles
      ansible.builtin.include_role:
        name: "{{ role_item }}"
      loop: "{{ core_roles_to_apply }}"
      loop_control:
        loop_var: role_item

    - name: Include Desktop Roles
      ansible.builtin.include_role:
        name: "{{ role_item }}"
      loop: "{{ desktop_roles_to_apply }}"
      loop_control:
        loop_var: role_item

    - name: Include Developer Roles
      ansible.builtin.include_role:
        name: "{{ role_item }}"
      loop: "{{ dev_roles_to_apply }}"
      loop_control:
        loop_var: role_item
