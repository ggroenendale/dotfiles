---
- name: Display Desktop Notifications Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Notifications Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Desktop Notifications Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Desktop Notifications Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Desktop Notifications Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Desktop Notifications Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Notifications Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Notifications Role Configuration ==="
