---
- name: Display Desktop Task Bar Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Task Bar Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Desktop Task Bar Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Desktop Task Bar Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Desktop Task Bar Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Desktop Task Bar Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Task Bar Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Task Bar Role Configuration ==="
