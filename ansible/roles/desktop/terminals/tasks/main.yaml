---
- name: Display Desktop Terminal Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Terminal Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Desktop Terminal Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Desktop Terminal Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Desktop Terminal Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Desktop Terminal Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Terminal Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Terminal Role Configuration ==="
