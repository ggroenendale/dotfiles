---
- name: Display Desktop Theme Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Theme Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Desktop Theme Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Desktop Theme Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Desktop Theme Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Desktop Theme Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Theme Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Theme Role Configuration ==="
