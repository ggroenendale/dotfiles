---
- name: Display Desktop Run Menu Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Run Menu Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Desktop Run Menu Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Desktop Run Menu Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Desktop Run Menu Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Desktop Run Menu Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Run Menu Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Run Menu Role Configuration ==="
