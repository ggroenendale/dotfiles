---
- name: Display Desktop Wayland Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Wayland Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Desktop Wayland Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Desktop Wayland Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Desktop Wayland Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Desktop Wayland Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Wayland Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Wayland Role Configuration ==="
