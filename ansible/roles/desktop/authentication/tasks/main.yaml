---
- name: Display Desktop Environment - Authentication Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Environment - Authentication Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Authentication Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Authentication Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Authentication Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Authentication Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Environment - Authentication Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Environment - Authentication Role Configuration ==="
