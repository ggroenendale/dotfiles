---
- name: Display Core Dotfiles Config Start
  ansible.builtin.debug:
    msg: "=== Begin Core Dotfiles Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Dotfiles Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Dotfiles Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Dotfiles Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Dotfiles Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

  # ===========================================================================
#
# ===========================================================================

- name: Display Core Dotfiles Config End
  ansible.builtin.debug:
    msg: "=== End Core Dotfiles Role Configuration ==="
