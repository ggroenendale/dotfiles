---
- name: Display Desktop Widgets Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Widgets Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Desktop Widgets Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Desktop Widgets Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Desktop Widgets Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Desktop Widgets Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu
# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Widgets Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Widgets Role Configuration ==="
