---
- name: Display Desktop Wallpaper Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Wallpaper Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Desktop Wallpaper Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Desktop Wallpaper Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Desktop Wallpaper Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Desktop Wallpaper Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Wallpaper Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Wallpaper Role Configuration ==="
