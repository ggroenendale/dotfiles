---
- name: Display Desktop Hyprland Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Hyprland Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Desktop Hyprland Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Desktop Hyprland Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Desktop Hyprland Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Desktop Hyprland Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu
# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Hyprland Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Hyprland Role Configuration ==="
