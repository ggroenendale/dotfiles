---
- name: Display Desktop Environment - File Managers Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Environment - File Managers Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch File Manager Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian File Manager Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE File Manager Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu File Manager Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Environment - File Managers Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Environment - File Managers Role Configuration ==="
