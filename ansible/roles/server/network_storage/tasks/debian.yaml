- name: Install Samba
  apt:
    name: samba
    state: present
    update_cache: true

- name: Copy custom smb.conf
  copy:
    src: smb.conf
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart samba

- name: Create Samba shared directory
  file:
    path: "{{ samba_share_path }}"
    state: directory
    owner: "{{ samba_user }}"
    group: "{{ samba_user }}"
    mode: "0775"

- name: Set Samba password for user
  command: "echo -ne '{{ samba_password }}\n{{ samba_password }}\n' | smbpasswd -a {{ samba_user }}"
  args:
    creates: "/var/lib/samba/private/passdb.tdb"
  when: samba_password is defined

- name: Enable and start smbd
  systemd:
    name: smbd
    enabled: true
    state: started

# Install mdadm
#
# This is necessary for ensuring the server can utilize Raid and access the raid that is on the drives I will use

- name: Install mdadm
  apt:
    name: mdadm
    state: present

- name: Assemble all detected RAID arrays
  command: mdadm --assemble --scan
  register: mdadm_result
  changed_when: "'No arrays found' not in mdadm_result.stdout"

- name: Persist mdadm config (optional but useful)
  command: mdadm --detail --scan
  register: mdadm_scan

- name: Write mdadm.conf from scanned arrays
  copy:
    dest: /etc/mdadm/mdadm.conf
    content: |
      DEVICE partitions
      {{ mdadm_scan.stdout }}
  when: mdadm_scan.stdout != ""
