---
- name: Display Developer Lang Tools - Yaml Config Start
  ansible.builtin.debug:
    msg: "=== Begin Developer Lang Tools - Yaml Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Lang Tools Yaml Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Lang Tools Yaml Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Lang Tools Yaml Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Lang Tools Yaml Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Developer Lang Tools - Yaml Config End
  ansible.builtin.debug:
    msg: "=== End Developer Lang Tools - Yaml Role Configuration ==="
