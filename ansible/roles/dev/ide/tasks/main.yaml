---
- name: Display Developer IDE Config Start
  ansible.builtin.debug:
    msg: "=== Begin Developer IDE Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Developer IDE Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Developer IDE Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Developer IDE Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Developer IDE Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Developer IDE Config End
  ansible.builtin.debug:
    msg: "=== End Developer IDE Role Configuration ==="
