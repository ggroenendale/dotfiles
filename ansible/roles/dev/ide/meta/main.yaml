galaxy_info:
  role_name: dev/ide
  description: Install and configure neovim and neovide
  license: MIT
  min_ansible_version: "2.14"

  platforms:
    - name: ArchLinux
      versions:
        - all
    - name: Debian
      versions:
        - bookwork
        - bullseye
    - name: OpenSUSE
      versions:
        - all
    - name: OpenSUSE
      versions:
        - all
    - name: Ubuntu
      versions:
        - all

dependencies:
  # Requires common requirements for install
  - role: common/git
  - role: common/curl
  - role: common/gcc
  - role: common/make
  - role: common/stow
  - role: common/nodejs_npm
  - role: common/python
  - role: common/rust
  - role: common/ruby
  # Other developer specific requirements
  - role: dev/lazygit
  - role: dev/lazydocker
  - role: dev/podman
