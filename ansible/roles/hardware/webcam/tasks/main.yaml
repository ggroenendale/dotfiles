---
- name: Display Hardware Webcam Config Start
  ansible.builtin.debug:
    msg: "=== Begin Hardware Webcam Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Hardware Webcam Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Hardware Webcam Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Hardware Webcam Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Hardware Webcam Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

  # ===========================================================================
#
# ===========================================================================

- name: Display Hardware Webcam Config End
  ansible.builtin.debug:
    msg: "=== End Hardware Webcam Role Configuration ==="
