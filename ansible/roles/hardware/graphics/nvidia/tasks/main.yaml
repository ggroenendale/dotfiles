---
- name: Display Hardware Graphics OpenGL Config Start
  ansible.builtin.debug:
    msg: "=== Begin Hardware Graphics OpenGL Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch OpenGL Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian OpenGL Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE OpenGL Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu OpenGL Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

  # ===========================================================================
#
# ===========================================================================

- name: Display Hardware Graphics OpenGL Config End
  ansible.builtin.debug:
    msg: "=== End Hardware Graphics OpenGL Role Configuration ==="
