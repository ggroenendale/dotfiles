---
- name: Display Hardware Bluetooth Config Start
  ansible.builtin.debug:
    msg: "=== Begin Hardware Bluetooth Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Hardware Bluetooth Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Hardware Bluetooth Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Hardware Bluetooth Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Hardware Bluetooth Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Hardware Bluetooth Config End
  ansible.builtin.debug:
    msg: "=== End Hardware Bluetooth Role Configuration ==="
