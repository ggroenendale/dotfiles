---
- name: Display Hardware Mouse Config Start
  ansible.builtin.debug:
    msg: "=== Begin Hardware Mouse Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Hardware Mouse Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Hardware Mouse Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Hardware Mouse Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Hardware Mouse Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

  # ===========================================================================
#
# ===========================================================================

- name: Display Hardware Mouse Config End
  ansible.builtin.debug:
    msg: "=== End Hardware Mouse Role Configuration ==="
