- name: Display User Config Start
  ansible.builtin.debug:
    msg: "=== Begin User Role Configuration ==="

# ===========================================================================
#
# ===========================================================================
- name: If Debian, Include Debian Users Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Users Config
  include_tasks: opensuse.yaml
  when: is_opensuse
# ===========================================================================
#
# ===========================================================================

- name: Display User Config End
  ansible.builtin.debug:
    msg: "=== End User Role Configuration ==="
