---
- name: Display Networking - WiFi Config Start
  ansible.builtin.debug:
    msg: "=== Begin Networking - WiFi Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch WiFi Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian WiFi Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE WiFi Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu WiFi Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Networking - WiFi Config End
  ansible.builtin.debug:
    msg: "=== End Networking - WiFi Role Configuration ==="
