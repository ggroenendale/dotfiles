---
- name: Display Networking - File Transfers Config Start
  ansible.builtin.debug:
    msg: "=== Begin Networking - File Transfers Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Network File Transfers Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Network File Transfers Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Network File Transfers Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Network File Transfers Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Networking - File Transfers Config End
  ansible.builtin.debug:
    msg: "=== End Networking - File Transfers Role Configuration ==="
