---
- name: Display Networking - VPN Config Start
  ansible.builtin.debug:
    msg: "=== Begin Networking - VPN Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch VPN Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian VPN Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE VPN Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu VPN Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Networking - VPN Config End
  ansible.builtin.debug:
    msg: "=== End Networking - VPN Role Configuration ==="
