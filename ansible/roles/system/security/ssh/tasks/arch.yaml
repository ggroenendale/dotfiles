---
# -----------------------------------------------------------------------------
# SSH Role for Arch Linux
# -----------------------------------------------------------------------------
# Variables that can be overridden:
#   - install_ssh_utils (default: false) – installs sshpass, mosh, sshfs, rsync
#   - configure_client    (default: false) → deploy ~/.ssh/config from template
#   - ssh_fail2ban        (default: false) → install and configure fail2ban for SSH
#   - ssh_port            (default: 22)    → port sshd listens on
#   - ssh_password_auth   (default: false) → enable password authentication
#   - ssh_allowed_users   (default: [])    → list of usernames allowed to log in via SSH
# -----------------------------------------------------------------------------

- name: Install OpenSSH (standard SSH server/client)
  become: true
  pacman:
    name:
      - openssh
    state: present
    # Arch does NOT use a cache like apt – update_cache is dangerous.
    # The default is update_cache: no, so it's omitted.

- name: Ensure SSH directory exists
  become: true
  file:
    path: /etc/ssh
    state: directory
    mode: "0755"

- name: Configure sshd_config (secure defaults)
  become: true
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
  notify: Restart SSH

- name: Enable SSH service (but don't start yet)
  become: true
  systemd:
    name: sshd
    enabled: true
    # masked: no is default, so omitted

- name: Generate SSH host keys if missing
  become: true
  command: ssh-keygen -A
  # ssh-keygen -A is idempotent – it never overwrites existing keys.
  # No 'creates' parameter needed.
  when: not ansible_check_mode

- name: Start SSH service (final step)
  become: true
  systemd:
    name: sshd
    state: started

# -----------------------------------------------------------------------------
# Optional SSH utilities
# -----------------------------------------------------------------------------
- name: Install optional SSH utilities
  become: true
  pacman:
    name:
      - sshpass # Insecure – stores passwords in plain text. Use only in sandboxes.
      - mosh # Mobile shell over UDP
      - sshfs # Mount remote directories over SSH
      - rsync # Efficient file sync and transfer
    state: present
  when: install_ssh_utils | default(false)

# -----------------------------------------------------------------------------
# SSH client configuration (per user)
# -----------------------------------------------------------------------------
- name: Ensure .ssh directory exists for the target user
  file:
    path: "{{ ansible_facts.env.HOME }}/.ssh"
    state: directory
    mode: "0700"
  when: configure_client | default(false)

- name: Create control master directory for SSH multiplexing
  file:
    path: "{{ ansible_env.HOME }}/.ssh/controlmasters"
    state: directory
    mode: "0700"
  when: configure_client | default(false)

- name: Configure SSH client (~/.ssh/config)
  template:
    src: ssh_client_config.j2
    dest: "{{ ansible_facts.env.HOME }}/.ssh/config"
    mode: "0600"
  when: configure_client | default(false)

# -----------------------------------------------------------------------------
# Fail2ban for SSH hardening
# -----------------------------------------------------------------------------
- name: Install fail2ban for SSH protection
  become: true
  pacman:
    name: fail2ban
    state: present
  when: ssh_fail2ban | default(false)

- name: Configure fail2ban for SSH
  become: true
  copy:
    content: |
      [sshd]
      enabled = true
      maxretry = 3
      bantime = 1h
    dest: /etc/fail2ban/jail.d/sshd.conf
  when: ssh_fail2ban | default(false)
  notify: Restart fail2ban

- name: Enable and start fail2ban service
  become: true
  systemd:
    name: fail2ban
    enabled: true
    state: started
  when: ssh_fail2ban | default(false)
