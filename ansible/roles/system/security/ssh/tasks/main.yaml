---
- name: Display Security - SSH Config Start
  ansible.builtin.debug:
    msg: "=== Begin Security - SSH Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch SSH Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian SSH Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE SSH Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu SSH Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Security - SSH Config End
  ansible.builtin.debug:
    msg: "=== End Security - SSH Role Configuration ==="
