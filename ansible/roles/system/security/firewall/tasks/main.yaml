---
- name: Display Security - Firewall Config Start
  ansible.builtin.debug:
    msg: "=== Begin Security - Firewall Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Firewall Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Firewall Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Firewall Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Firewall Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Security - Firewall Config End
  ansible.builtin.debug:
    msg: "=== End Security - Firewall Role Configuration ==="
