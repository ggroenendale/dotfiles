---
- name: Install paru dependencies (base-devel and git)
  become: true
  pacman:
    name:
      - base-devel
      - git
    state: present
    update_cache: yes

- name: Make a tmp directory
  file:
    path: /tmp/paru
    mode: "0777"
    state: directory

- name: Git Clone paru from AUR
  git:
    repo: https://aur.archlinux.org/paru.git
    dest: /tmp/paru
    clone: yes
    force: yes

#- name: Build and install paru
#  command:
#    cmd: makepkg -si --noconfirm
#    chdir: /tmp/paru
#  #become: true
#  become_user: install_wizard # Build as unprivileged user (security best practice)
#  environment:
#    HOME: /tmp # Needed for makepkg to work correctly

- name: Clean up build files
  file:
    path: /tmp/paru
    state: absent

- name: Configure paru (optional)
  copy:
    content: |
      [options]
      # Skip review prompts
      SkipReview
      # Remove make dependencies after install
      RemoveMake
      # Enable colored output
      Color
    dest: /etc/paru.conf
    owner: root
    group: root
    mode: "0644"

# ==============================================================================
# Determine which side to keep...
# ==============================================================================

# Package Management Role
# Installs the Paru AUR helper on Arch Linux systems.
# Only runs on Arch Linux — skipped on Debian/Ubuntu/openSUSE.

- name: Check if paru is already installed
  ansible.builtin.command: which paru
  register: paru_check
  changed_when: false
  failed_when: false
  when: ansible_distribution == "Archlinux"

- name: Install build dependencies for Paru
  ansible.builtin.package:
    name:
      - base-devel
      - git
    state: present
  become: true
  when:
    - ansible_facts['distribution'] == "Archlinux"
    - paru_check.rc != 0

- name: Create temporary build directory
  ansible.builtin.tempfile:
    state: directory
    suffix: paru-build
  register: build_dir
  when:
    - ansible_facts['distribution'] == "Archlinux"
    - paru_check.rc != 0

- name: Clone Paru from AUR
  ansible.builtin.git:
    repo: https://aur.archlinux.org/paru.git
    dest: "{{ build_dir.path }}"
    depth: 1
  when:
    - ansible_facts['distribution'] == "Archlinux"
    - paru_check.rc != 0

- name: Build and install Paru with makepkg
  ansible.builtin.command:
    cmd: makepkg -si --noconfirm
    chdir: "{{ build_dir.path }}"
  become: true
  when:
    - ansible_facts['distribution'] == "Archlinux"
    - paru_check.rc != 0
  register: paru_install
  changed_when: paru_install.rc == 0

- name: Clean up temporary build directory
  ansible.builtin.file:
    path: "{{ build_dir.path }}"
    state: absent
  when:
    - ansible_facts['distribution'] == "Archlinux"
    - paru_check.rc != 0

- name: Verify Paru installation
  ansible.builtin.command: paru --version
  register: paru_version
  changed_when: false
  when: ansible_facts['distribution'] == "Archlinux"

- name: Report Paru version
  ansible.builtin.debug:
    msg: "Paru installed: {{ paru_version.stdout_lines[0] if paru_version.stdout_lines is defined else 'already present' }}"
  when: ansible_facts['distribution'] == "Archlinux"
