---
- name: Display Desktop Applications - Zen Browser Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Applications - Zen Browser Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Zen Browser Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Zen Browser Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Zen Browser Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Zen Browser Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu
# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Applications - Zen Browser Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Applications - Zen Browser Role Configuration ==="
