---
- name: Display Desktop Applications - Firefox Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Applications - Firefox Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Firefox Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Firefox Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Firefox Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Firefox Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

  # ===========================================================================
#
# ===========================================================================

- name: Display Desktop Applications - Firefox Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Applications - Firefox Role Configuration ==="
