---
- name: Display Desktop Applications - LibreOffice Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Applications - LibreOffice Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch LibreOffice Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian LibreOffice Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE LibreOffice Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu LibreOffice Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

  # ===========================================================================
#
# ===========================================================================

- name: Display Desktop Applications - LibreOffice Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Applications - LibreOffice Role Configuration ==="
