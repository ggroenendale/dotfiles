---
- name: Display Desktop Applications - Blender Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Applications - Blender Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Blender Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Blender Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Blender Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Blender Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

  # ===========================================================================
#
# ===========================================================================

- name: Display Desktop Applications - Blender Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Applications - Blender Role Configuration ==="
