---
- name: Display Desktop Applications - Steam - Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Applications - Steam - Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Steam Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Steam Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Steam Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Steam Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu
# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Applications - Steam - Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Applications - Steam - Role Configuration ==="
