---
- name: Display Desktop Applications - Brave Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Applications - Brave Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Brave Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Brave Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Brave Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Brave Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

  # ===========================================================================
#
# ===========================================================================

- name: Display Desktop Applications - Brave Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Applications - Brave Role Configuration ==="
