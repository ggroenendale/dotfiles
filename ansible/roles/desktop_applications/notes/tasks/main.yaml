- name: Display Desktop Applications - Notes - Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Applications - Notes - Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Notes Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Notes Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Notes Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Notes Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Applications - Notes - Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Applications - Notes - Role Configuration ==="
