---
- name: Display Desktop Applications - Video Player - Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Applications - Video Player - Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Video Player Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Video Player Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Video Player Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Video Player Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu
# ===========================================================================
#
# ===========================================================================

- name: Display Desktop Applications - Video Player - Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Applications - Video Player - Role Configuration ==="
