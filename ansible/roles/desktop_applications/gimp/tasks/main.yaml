---
- name: Display Desktop Applications - Gimp Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Applications - Gimp Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Gimp Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Gimp Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Gimp Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Gimp Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

  # ===========================================================================
#
# ===========================================================================

- name: Display Desktop Applications - Gimp Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Applications - Gimp Role Configuration ==="
