---
- name: Display Desktop Applications - FreeCAD Config Start
  ansible.builtin.debug:
    msg: "=== Begin Desktop Applications - FreeCAD Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch FreeCAD Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian FreeCAD Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE FreeCAD Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu FreeCAD Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

  # ===========================================================================
#
# ===========================================================================

- name: Display Desktop Applications - FreeCAD Config End
  ansible.builtin.debug:
    msg: "=== End Desktop Applications - FreeCAD Role Configuration ==="
