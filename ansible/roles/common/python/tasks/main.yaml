---
- name: Display Common Python Config Start
  ansible.builtin.debug:
    msg: "=== Begin Common Python Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Python Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Python Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Python Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Python Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Common Python Config End
  ansible.builtin.debug:
    msg: "=== End Common Python Role Configuration ==="
