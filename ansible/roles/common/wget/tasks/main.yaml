---
- name: Display Common Wget Config Start
  ansible.builtin.debug:
    msg: "=== Begin Common Wget Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Wget Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Wget Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Wget Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Wget Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Common Wget Config End
  ansible.builtin.debug:
    msg: "=== End Common Wget Role Configuration ==="
