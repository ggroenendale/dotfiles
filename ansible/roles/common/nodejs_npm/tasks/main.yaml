---
- name: Display Common Nodejs Config Start
  ansible.builtin.debug:
    msg: "=== Begin Common Nodejs Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Nodejs Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Nodejs Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Nodejs Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Nodejs Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Common nodejs Config End
  ansible.builtin.debug:
    msg: "=== End Common Nodejs Role Configuration ==="
