---
- name: Display Common Go Config Start
  ansible.builtin.debug:
    msg: "=== Begin Common Go Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Go Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Go Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Go Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Go Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Common Go Config End
  ansible.builtin.debug:
    msg: "=== End Common Go Role Configuration ==="
