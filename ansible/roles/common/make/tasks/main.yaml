---
- name: Display Common Make Config Start
  ansible.builtin.debug:
    msg: "=== Begin Common Make Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Make Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Make Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Make Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Make Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Common Make Config End
  ansible.builtin.debug:
    msg: "=== End Common Make Role Configuration ==="
