---
- name: Display Common Curl Config Start
  ansible.builtin.debug:
    msg: "=== Begin Common Curl Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Curl Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Curl Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Curl Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Curl Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Common Curl Config End
  ansible.builtin.debug:
    msg: "=== End Common Curl Role Configuration ==="
