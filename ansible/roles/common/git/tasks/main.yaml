---
- name: Display Common Git Config Start
  ansible.builtin.debug:
    msg: "=== Begin Common Git Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Git Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Git Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Git Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Git Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Common Git Config End
  ansible.builtin.debug:
    msg: "=== End Common Git Role Configuration ==="
