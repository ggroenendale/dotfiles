---
- name: Display Common GNU Compiler Collection Config Start
  ansible.builtin.debug:
    msg: "=== Begin Common GNU Compiler Collection Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch GCC Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian GCC Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE GCC Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu GCC Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Common GNU Compiler Collection Config End
  ansible.builtin.debug:
    msg: "=== End Common GNU Compiler Collection Role Configuration ==="
