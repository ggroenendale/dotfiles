---
- name: Display Common Stow Config Start
  ansible.builtin.debug:
    msg: "=== Begin Common Stow Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Stow Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Stow Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Stow Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Stow Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Common Stow Config End
  ansible.builtin.debug:
    msg: "=== End Common Stow Role Configuration ==="
