---
- name: Display Common Rust Config Start
  ansible.builtin.debug:
    msg: "=== Begin Common Rust Role Configuration ==="

# ===========================================================================
#
# ===========================================================================

- name: If Arch, Include Arch Rust Config
  include_tasks: arch.yaml
  when: is_arch

- name: If Debian, Include Debian Rust Config
  include_tasks: debian.yaml
  when: is_debian

- name: If OpenSUSE, Include OpenSUSE Rust Config
  include_tasks: opensuse.yaml
  when: is_opensuse

- name: If Ubuntu, Include Ubuntu Rust Config
  include_tasks: ubuntu.yaml
  when: is_ubuntu

# ===========================================================================
#
# ===========================================================================

- name: Display Common Rust Config End
  ansible.builtin.debug:
    msg: "=== End Common Rust Role Configuration ==="
